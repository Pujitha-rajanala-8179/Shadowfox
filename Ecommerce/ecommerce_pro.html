<!DOCTYPE html>
<html>
<head>
<title>MyShop - Professional Store</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef1f5;
}


.navbar{
background:linear-gradient(90deg,#ff8a65,#ff7043);
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.logo{
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

.nav-links button{
margin:5px;
padding:8px 16px;
border:none;
background:white;
color:#ff7043;
border-radius:6px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.nav-links button:hover{
background:#ffe0b2;
transform:scale(1.05);
}


.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.login-box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
color:white;
}

.login-box input{
width:100%;
padding:12px;
margin:12px 0;
border:none;
border-radius:8px;
background:rgb(227, 175, 140);
color:white;
outline:none;
}

.login-box button{
background:linear-gradient(45deg,#ff9800,#ff5722);
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
}


.hero{
background:url("https://cdn.pixabay.com/photo/2016/11/29/09/08/ecommerce-1868173_1280.jpg");
height:260px;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:rgb(255, 77, 1);
font-size:40px;
font-weight:bold;
}


.container{
width:90%;
margin:auto;
margin-top:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:18px;
border-radius:12px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

.rating{
color:orange;
}

button{
background:linear-gradient(45deg,#ff7043,#ff5722);
border:none;
padding:10px 18px;
color:white;
cursor:pointer;
border-radius:8px;
}

.page{
display:none;
}

footer{
background:#263238;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="login">
<div class="login-box">
<h2>Login</h2>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN WEBSITE -->

<div id="mainSite" style="display:none">

<div class="navbar">

<div class="logo">MyShop</div>

<div class="nav-links">

<button onclick="showPage('home')"><i class="fa fa-home"></i></button>
<button onclick="showPage('cartPage')"><i class="fa fa-shopping-cart"></i></button>
<button onclick="showPage('walletPage')"><i class="fa fa-wallet"></i></button>
<button onclick="showPage('paymentPage')"><i class="fa fa-credit-card"></i></button>

</div>
</div>

<div class="hero">Big Sale Today</div>

<!-- HOME -->

<div id="home" class="page" style="display:block">
<div class="container">
<div class="products" id="productList"></div>
</div>
</div>

<!-- CART -->

<div id="cartPage" class="page">
<div class="container">
<h2>🛒 Cart</h2>
<ul id="cartItems"></ul>
<h3>Total: ₹<span id="total">0</span></h3>
<button onclick="showPage('paymentPage')">Proceed to Payment</button>
</div>
</div>

<!-- WALLET -->

<div id="walletPage" class="page">
<div class="container">
<h2>Wallet</h2>
<h3>Balance: ₹<span id="balance">5000</span></h3>
<input type="number" id="money" placeholder="Enter amount">
<button onclick="addMoney()">Add Money</button>
</div>
</div>

<!-- PAYMENT -->

<div id="paymentPage" class="page">
<div class="container">
<h2>Payment</h2>
<input placeholder="Card Number"><br><br>
<input placeholder="Card Holder Name"><br><br>
<input placeholder="CVV"><br><br>
<button onclick="payNow()">Pay Now</button>
</div>
</div>

<footer>
<p>© 2026 MyShop | Designed by Poojitha</p>
</footer>

</div>

<script>

let products=[
{name:"Laptop",price:55000,img:"https://tech4growth.dqindia.com/wp-content/uploads/2022/07/Best-HP-laptops-1440x564_c-1440x564_c.jpg",rating:"⭐⭐⭐⭐"},
{name:"Phone",price:30000,img:"https://www.livemint.com/lm-img/img/2024/05/13/1600x900/vivo-v30e-launch-schedule_1713518301080_1715593799357.jpg",rating:"⭐⭐⭐⭐⭐"},
{name:"Headphones",price:2500,img:"https://cdn.shopify.com/s/files/1/0548/8849/7221/files/Artboard_3_e62dab35-b7c1-483e-a195-aa0f83225f50.jpg?v=1766997342",rating:"⭐⭐⭐⭐"},
{name:"Shoes",price:2000,img:"https://rukminim1.flixcart.com/image/1536/1536/xif0q/shoe/4/s/r/8-trend-77-sneakers-08-8-0-pocy-shoes-white-original-imahg6h6ghdgzawa.jpeg?q=90",rating:"⭐⭐⭐⭐"}
];

let cart=[];

function login(){
document.getElementById("loginPage").style.display="none";
document.getElementById("mainSite").style.display="block";
}

function showPage(page){
document.querySelectorAll(".page").forEach(p=>{
p.style.display="none";
});
document.getElementById(page).style.display="block";
}

function displayProducts(){
let list=document.getElementById("productList");

products.forEach((p,i)=>{

list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>
<p class="rating">${p.rating}</p>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>
`;

});
}

function addToCart(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
let cartItems=document.getElementById("cartItems");
let total=0;

cartItems.innerHTML="";

cart.forEach(item=>{
cartItems.innerHTML+=`<li>${item.name} - ₹${item.price}</li>`;
total+=item.price;
});

document.getElementById("total").innerText=total;
}

function addMoney(){
let amount=document.getElementById("money").value;
let balance=document.getElementById("balance");

balance.innerText=parseInt(balance.innerText)+parseInt(amount);

alert("Money added!");
}

function payNow(){
alert("Payment Successful!");
cart=[];
updateCart();
}

displayProducts();

</script>

</body>
</html>
